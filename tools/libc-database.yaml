name: libc-database
command: python3
args:
- -c
- "import shlex\nimport subprocess\nimport sys\n\nif len(sys.argv) < 2:\n    sys.stderr.write(\"\u7F3A\u5C11\u64CD\u4F5C\u7C7B\u578B\uFF08find/dump/download\uFF09\\n\")\n    sys.exit(1)\n\naction = sys.argv[1]\nsymbols = sys.argv[2] if len(sys.argv) > 2 else \"\"\nlibc_id = sys.argv[3] if len(sys.argv) > 3 else \"\"\nextra = sys.argv[4] if len(sys.argv) > 4 else \"\"\n\ncmd = [\"libc-database\", action]\n\nif symbols:\n    cmd.extend(shlex.split(symbols))\n\nif libc_id:\n    cmd.append(libc_id)\n\nif extra:\n    cmd.extend(shlex.split(extra))\n\nproc = subprocess.run(cmd, capture_output=True, text=True)\nif proc.stdout:\n    sys.stdout.write(proc.stdout)\nif proc.stderr:\n    sys.stderr.write(proc.stderr)\nsys.exit(proc.returncode)\n"
enabled: true
short_description: Run the libc-database security tool.
description: 'CyberStrikeAI wrapper for `libc-database`. Command: `python3`. Review scope and arguments before execution.'
