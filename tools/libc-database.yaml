- name: action
  type: string
  description: Value for `action`.
  required: true
  position: 0
  format: positional
- name: symbols
  type: string
  description: Value for `symbols`.
  required: false
  default: ''
  position: 1
  format: positional
- name: libc_id
  type: string
  description: Value for `libc_id`.
  required: false
  default: ''
  position: 2
  format: positional
- name: additional_args
  type: string
