name: dirsearch
command: dirsearch
enabled: true
short_description: Run the dirsearch security tool.
description: 'CyberStrikeAI wrapper for `dirsearch`. Command: `dirsearch`. Review scope and arguments before execution.'
parameters:
- name: url
  type: string
  description: Value for `url`. Maps to `-u`.
  required: true
  flag: -u
  format: flag
- name: extensions
  type: string
  description: Value for `extensions`. Maps to `-e`.
  required: false
  flag: -e
  format: flag
  default: php,html,js,txt,xml,json
- name: wordlist
  type: string
  description: Value for `wordlist`. Maps to `-w`.
  required: false
  flag: -w
  format: flag
- name: threads
  type: int
  description: Value for `threads`. Maps to `-t`.
  required: false
  flag: -t
  format: flag
  default: 30
- name: recursive
  type: bool
  description: Value for `recursive`. Maps to `-r`.
  required: false
  flag: -r
  format: flag
  default: false
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  format: positional
