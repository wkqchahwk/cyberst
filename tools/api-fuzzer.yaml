name: api-fuzzer
command: python3
args:
- -c
- "import pathlib\nimport sys\nimport textwrap\nfrom urllib.parse import urljoin\n\nimport requests\n\nif len(sys.argv) < 2:\n    sys.stderr.write(\"\u7F3A\u5C11 base_url \u53C2\u6570\\n\")\n    sys.exit(1)\n\nbase_url = sys.argv[1]\nendpoints_arg = sys.argv[2] if len(sys.argv) > 2 else \"\"\nmethods_arg = sys.argv[3] if len(sys.argv) > 3 else \"GET,POST\"\nwordlist_path = sys.argv[4] if len(sys.argv) > 4 else \"\"\ntimeout = float(sys.argv[5]) if len(sys.argv) > 5 and sys.argv[5] else 10.0\n\nmethods = [m.strip().upper() for m in methods_arg.split(\",\") if m.strip()]\nif not methods:\n    methods = [\"GET\"]\n\nendpoints = []\nif endpoints_arg:\n    endpoints = [ep.strip() for ep in endpoints_arg.split(\",\") if ep.strip()]\nelif wordlist_path:\n    path = pathlib.Path(wordlist_path)\n    if not path.is_file():\n        sys.stderr.write(f\"\u5B57\u5178\u6587\u4EF6\u4E0D\u5B58\u5728: {path}\\n\")\n        sys.exit(1)\n    endpoints = [line.strip() for line in path.read_text().splitlines()\
  \ if line.strip()]\n\nif not endpoints:\n    sys.stderr.write(\"\u672A\u63D0\u4F9B\u7AEF\u70B9\u5217\u8868\u6216\u5B57\u5178\u3002\\n\")\n    sys.exit(1)\n\nresults = []\nfor endpoint in endpoints:\n    url = urljoin(base_url.rstrip(\"/\") + \"/\", endpoint.lstrip(\"/\"))\n    for method in methods:\n        try:\n            resp = requests.request(method, url, timeout=timeout, allow_redirects=False)\n            results.append({\n                \"method\": method,\n                \"endpoint\": endpoint,\n                \"status\": resp.status_code,\n                \"length\": len(resp.content),\n                \"redirect\": resp.headers.get(\"Location\", \"\")\n            })\n        except requests.RequestException as exc:\n            results.append({\n                \"method\": method,\n                \"endpoint\": endpoint,\n                \"error\": str(exc)\n            })\n\nfor item in results:\n    if \"error\" in item:\n        print(f\"[{item['method']}] {item['endpoint']}\
  \ -> ERROR: {item['error']}\")\n    else:\n        redirect = f\" -> {item['redirect']}\" if item.get(\"redirect\") else \"\"\n        print(f\"[{item['method']}] {item['endpoint']} -> {item['status']} ({item['length']} bytes){redirect}\")\n"
enabled: true
short_description: Run the api-fuzzer security tool.
description: 'CyberStrikeAI wrapper for `api-fuzzer`. Command: `python3`. Review scope and arguments before execution.'
parameters:
- name: base_url
  type: string
  description: Value for `base_url`.
  required: true
  position: 0
  format: positional
- name: endpoints
  type: string
  description: Value for `endpoints`.
  required: false
  default: ''
  position: 1
  format: positional
- name: methods
  type: string
  description: Value for `methods`.
  required: false
  default: GET,POST
  position: 2
  format: positional
- name: wordlist
  type: string
  description: Value for `wordlist`.
  required: false
  default: /usr/share/wordlists/api/api-endpoints.txt
  position: 3
  format: positional
- name: timeout
  type: string
  description: Value for `timeout`.
  required: false
  default: '10'
  position: 4
  format: positional
