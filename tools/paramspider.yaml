name: paramspider
command: paramspider
enabled: true
short_description: Run the paramspider security tool.
description: 'CyberStrikeAI wrapper for `paramspider`. Command: `paramspider`. Review scope and arguments before execution.'
parameters:
- name: domain
  type: string
  description: Value for `domain`. Maps to `-d`.
  required: true
  flag: -d
  format: flag
- name: level
  type: int
  description: Value for `level`. Maps to `-l`.
  required: false
  flag: -l
  format: flag
  default: 2
- name: exclude
  type: string
  description: Value for `exclude`. Maps to `-e`.
  required: false
  flag: -e
  format: flag
- name: output
  type: string
  description: Value for `output`. Maps to `-o`.
  required: false
  flag: -o
  format: flag
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  format: positional
