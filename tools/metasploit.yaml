name: metasploit
command: python3
args:
- -c
- "import json\nimport shlex\nimport subprocess\nimport sys\n\nif len(sys.argv) < 2:\n    sys.stderr.write(\"\u7F3A\u5C11\u6A21\u5757\u540D\u79F0\\n\")\n    sys.exit(1)\n\nmodule = sys.argv[1]\noptions_raw = sys.argv[2] if len(sys.argv) > 2 else \"{}\"\nextra = sys.argv[3] if len(sys.argv) > 3 else \"\"\n\ntry:\n    options = json.loads(options_raw) if options_raw else {}\nexcept json.JSONDecodeError as exc:\n    sys.stderr.write(f\"\u9009\u9879\u89E3\u6790\u5931\u8D25: {exc}\\n\")\n    sys.exit(1)\n\ncommands = [f\"use {module}\"]\nfor key, value in options.items():\n    commands.append(f\"set {key} {value}\")\ncommands.append(\"run\")\ncommands.append(\"exit\")\n\ncmd = [\"msfconsole\", \"-q\", \"-x\", \"; \".join(commands)]\nif extra:\n    cmd.extend(shlex.split(extra))\n\nsubprocess.run(cmd, check=False)\n"
enabled: true
requires_action_enabled: true
short_description: Run the metasploit security tool.
description: 'CyberStrikeAI wrapper for `metasploit`. Command: `python3`. Review scope and arguments before execution.'
parameters:
- name: module
  type: string
  description: Value for `module`.
  required: true
  position: 0
  format: positional
- name: options
  type: string
  description: Value for `options`.
  required: false
  default: '{}'
  position: 1
  format: positional
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  default: ''
  position: 2
  format: positional
