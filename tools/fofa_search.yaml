name: fofa_search
command: python3
args:
- -c
- "import sys\nimport json\nimport base64\nimport requests\nimport os\n\n# ==================== FOFA\u914D\u7F6E ====================\n# \u8BF7\u5728\u6B64\u5904\u914D\u7F6E\u60A8\u7684FOFA\u8D26\u53F7\u4FE1\u606F\n# \u60A8\u4E5F\u53EF\u4EE5\u5728\u73AF\u5883\u53D8\u91CF\u4E2D\u8BBE\u7F6E\uFF1AFOFA_EMAIL \u548C FOFA_API_KEY\n# enable \u9ED8\u8BA4\u4E3A false\uFF0C\u9700\u5F00\u542F\u624D\u80FD\u8C03\u7528\u8BE5MCP\nFOFA_EMAIL = \"\"  # \u8BF7\u586B\u5199\u60A8\u7684FOFA\u8D26\u53F7\u90AE\u7BB1\nFOFA_API_KEY = \"\"  # \u8BF7\u586B\u5199\u60A8\u7684FOFA API\u5BC6\u94A5\n# ==================================================\n\n# FOFA API\u57FA\u7840URL\nbase_url = \"https://fofa.info/api/v1/search/all\"\n\n# \u89E3\u6790\u53C2\u6570\uFF08\u4ECEJSON\u5B57\u7B26\u4E32\u6216\u547D\u4EE4\u884C\u53C2\u6570\uFF09\ndef parse_args():\n    # \u5C1D\u8BD5\u4ECE\u7B2C\u4E00\u4E2A\u53C2\u6570\u8BFB\u53D6JSON\u914D\u7F6E\n    if len(sys.argv) > 1:\n        try:\n            # \u786E\u4FDD sys.argv[1] \u662F\
  \u5B57\u7B26\u4E32\n            arg1 = str(sys.argv[1])\n            # \u5C1D\u8BD5\u89E3\u6790\u4E3AJSON\n            config = json.loads(arg1)\n            # \u786E\u4FDD\u8FD4\u56DE\u7684\u662F\u5B57\u5178\u7C7B\u578B\n            if isinstance(config, dict):\n                return config\n        except (json.JSONDecodeError, TypeError, ValueError):\n            # \u5982\u679C\u4E0D\u662FJSON\uFF0C\u4F7F\u7528\u4F20\u7EDF\u7684\u4F4D\u7F6E\u53C2\u6570\u65B9\u5F0F\n            pass\n\n    # \u4F20\u7EDF\u4F4D\u7F6E\u53C2\u6570\u65B9\u5F0F\uFF08\u5411\u540E\u517C\u5BB9\uFF09\n    # \u6CE8\u610F\uFF1Aemail \u548C api_key \u5DF2\u4ECE\u53C2\u6570\u4E2D\u79FB\u9664\uFF0C\u73B0\u5728\u4ECE\u914D\u7F6E\u4E2D\u8BFB\u53D6\n    # \u53C2\u6570\u4F4D\u7F6E\uFF1Aquery=2, size=3, page=4, fields=5, full=6\n    # \u4F46\u5728 sys.argv \u4E2D\uFF0C\u7531\u4E8E python3 -c \"code\" \u7684\u683C\u5F0F\uFF0C\u5B9E\u9645\u4F4D\u7F6E\u9700\u8981\u8C03\u6574\n    # sys.argv[0] \u662F '-c'\uFF0Csys.argv[1]\
  \ \u5F00\u59CB\u662F\u5B9E\u9645\u53C2\u6570\n    config = {}\n    if len(sys.argv) > 1:\n        config['query'] = str(sys.argv[1])\n    if len(sys.argv) > 2:\n        try:\n            config['size'] = int(sys.argv[2])\n        except (ValueError, TypeError):\n            pass\n    if len(sys.argv) > 3:\n        try:\n            config['page'] = int(sys.argv[3])\n        except (ValueError, TypeError):\n            pass\n    if len(sys.argv) > 4:\n        config['fields'] = str(sys.argv[4])\n    if len(sys.argv) > 5:\n        val = sys.argv[5]\n        if isinstance(val, str):\n            config['full'] = val.lower() in ('true', '1', 'yes')\n        else:\n            config['full'] = bool(val)\n    return config\n\ntry:\n    config = parse_args()\n\n    # \u786E\u4FDD config \u662F\u5B57\u5178\u7C7B\u578B\n    if not isinstance(config, dict):\n        error_result = {\n            \"status\": \"error\",\n            \"message\": f\"\u53C2\u6570\u89E3\u6790\u9519\u8BEF: \u671F\u671B\
  \u5B57\u5178\u7C7B\u578B\uFF0C\u4F46\u5F97\u5230 {type(config).__name__}\",\n            \"type\": \"TypeError\"\n        }\n        print(json.dumps(error_result, ensure_ascii=False, indent=2))\n        sys.exit(1)\n\n    # \u4ECE\u914D\u7F6E\u6216\u73AF\u5883\u53D8\u91CF\u83B7\u53D6email\u548Capi_key\n    email = os.getenv('FOFA_EMAIL', FOFA_EMAIL).strip()\n    api_key = os.getenv('FOFA_API_KEY', FOFA_API_KEY).strip()\n    query = config.get('query', '').strip()\n\n    if not email:\n        error_result = {\n            \"status\": \"error\",\n            \"message\": \"\u7F3A\u5C11FOFA\u914D\u7F6E: email\uFF08FOFA\u8D26\u53F7\u90AE\u7BB1\uFF09\",\n            \"required_config\": [\"email\", \"api_key\"],\n            \"note\": \"\u8BF7\u5728YAML\u6587\u4EF6\u7684FOFA_EMAIL\u914D\u7F6E\u9879\u4E2D\u586B\u5199\u60A8\u7684FOFA\u8D26\u53F7\u90AE\u7BB1\uFF0C\u6216\u5728\u73AF\u5883\u53D8\u91CFFOFA_EMAIL\u4E2D\u8BBE\u7F6E\"\n        }\n        print(json.dumps(error_result, ensure_ascii=False,\
  \ indent=2))\n        sys.exit(1)\n\n    if not api_key:\n        error_result = {\n            \"status\": \"error\",\n            \"message\": \"\u7F3A\u5C11FOFA\u914D\u7F6E: api_key\uFF08FOFA API\u5BC6\u94A5\uFF09\",\n            \"required_config\": [\"email\", \"api_key\"],\n            \"note\": \"\u8BF7\u5728YAML\u6587\u4EF6\u7684FOFA_API_KEY\u914D\u7F6E\u9879\u4E2D\u586B\u5199\u60A8\u7684API\u5BC6\u94A5\uFF0C\u6216\u5728\u73AF\u5883\u53D8\u91CFFOFA_API_KEY\u4E2D\u8BBE\u7F6E\u3002API\u5BC6\u94A5\u53EF\u5728FOFA\u4E2A\u4EBA\u4E2D\u5FC3\u83B7\u53D6: https://fofa.info/userInfo\"\n        }\n        print(json.dumps(error_result, ensure_ascii=False, indent=2))\n        sys.exit(1)\n\n    if not query:\n        error_result = {\n            \"status\": \"error\",\n            \"message\": \"\u7F3A\u5C11\u5FC5\u9700\u53C2\u6570: query\uFF08\u641C\u7D22\u67E5\u8BE2\u8BED\u53E5\uFF09\",\n            \"required_params\": [\"query\"],\n            \"examples\": [\n                'app=\"\
  Apache\"',\n                'title=\"\u767B\u5F55\"',\n                'domain=\"example.com\"',\n                'ip=\"1.1.1.1\"',\n                'port=\"80\"',\n                'country=\"CN\"',\n                'city=\"Beijing\"'\n            ]\n        }\n        print(json.dumps(error_result, ensure_ascii=False, indent=2))\n        sys.exit(1)\n\n    # \u6784\u5EFA\u8BF7\u6C42\u53C2\u6570\n    params = {\n        'email': email,\n        'key': api_key,\n        'qbase64': base64.b64encode(query.encode('utf-8')).decode('utf-8')\n    }\n\n    # \u53EF\u9009\u53C2\u6570\n    if 'size' in config and config['size'] is not None:\n        try:\n            size = int(config['size'])\n            if size > 0:\n                params['size'] = size\n        except (ValueError, TypeError):\n            pass\n\n    if 'page' in config and config['page'] is not None:\n        try:\n            page = int(config['page'])\n            if page > 0:\n                params['page'] = page\n   \
  \     except (ValueError, TypeError):\n            pass\n\n    if 'fields' in config and config['fields']:\n        params['fields'] = str(config['fields']).strip()\n\n    if 'full' in config and config['full'] is not None:\n        full_val = config['full']\n        if isinstance(full_val, bool):\n            params['full'] = 'true' if full_val else 'false'\n        elif isinstance(full_val, str):\n            params['full'] = 'true' if full_val.lower() in ('true', '1', 'yes') else 'false'\n        elif isinstance(full_val, (int, float)):\n            params['full'] = 'true' if full_val != 0 else 'false'\n\n    # \u53D1\u9001\u8BF7\u6C42\n    try:\n        response = requests.get(base_url, params=params, timeout=30)\n        response.raise_for_status()\n\n        result_data = response.json()\n\n        # \u68C0\u67E5FOFA API\u8FD4\u56DE\u7684\u9519\u8BEF\n        if result_data.get('error'):\n            error_result = {\n                \"status\": \"error\",\n                \"message\"\
  : f\"FOFA API\u9519\u8BEF: {result_data.get('errmsg', '\u672A\u77E5\u9519\u8BEF')}\",\n                \"error_code\": result_data.get('error'),\n                \"suggestion\": \"\u8BF7\u68C0\u67E5API\u5BC6\u94A5\u662F\u5426\u6B63\u786E\uFF0C\u6216\u67E5\u8BE2\u8BED\u53E5\u662F\u5426\u7B26\u5408FOFA\u8BED\u6CD5\"\n            }\n            print(json.dumps(error_result, ensure_ascii=False, indent=2))\n            sys.exit(1)\n\n        # \u683C\u5F0F\u5316\u8F93\u51FA\u7ED3\u679C\n        output = {\n            \"status\": \"success\",\n            \"query\": query,\n            \"size\": result_data.get('size', 0),\n            \"page\": result_data.get('page', 1),\n            \"total\": result_data.get('total', 0),\n            \"results_count\": len(result_data.get('results', [])),\n            \"results\": result_data.get('results', []),\n            \"message\": f\"\u6210\u529F\u83B7\u53D6 {len(result_data.get('results', []))} \u6761\u7ED3\u679C\"\n        }\n\n        print(json.dumps(output,\
  \ ensure_ascii=False, indent=2))\n\n    except requests.exceptions.RequestException as e:\n        error_result = {\n            \"status\": \"error\",\n            \"message\": f\"\u8BF7\u6C42\u5931\u8D25: {str(e)}\",\n            \"suggestion\": \"\u8BF7\u68C0\u67E5\u7F51\u7EDC\u8FDE\u63A5\u6216FOFA API\u670D\u52A1\u72B6\u6001\"\n        }\n        print(json.dumps(error_result, ensure_ascii=False, indent=2))\n        sys.exit(1)\n\nexcept Exception as e:\n    error_result = {\n        \"status\": \"error\",\n        \"message\": f\"\u6267\u884C\u51FA\u9519: {str(e)}\",\n        \"type\": type(e).__name__\n    }\n    print(json.dumps(error_result, ensure_ascii=False, indent=2))\n    sys.exit(1)\n"
enabled: false
short_description: Run the fofa_search security tool.
description: 'CyberStrikeAI wrapper for `fofa_search`. Command: `python3`. Review scope and arguments before execution.'
parameters:
- name: query
  type: string
  description: Value for `query`.
  required: true
  position: 2
  format: positional
- name: size
  type: int
  description: Value for `size`.
  required: false
  position: 3
  format: positional
  default: 100
- name: page
  type: int
  description: Value for `page`.
  required: false
  position: 4
  format: positional
  default: 1
- name: fields
  type: string
  description: Value for `fields`.
  required: false
  position: 5
  format: positional
  default: ip,port,domain
- name: full
  type: bool
  description: Value for `full`.
  required: false
  position: 6
  format: positional
  default: false
