name: ffuf
command: ffuf
enabled: true
short_description: Run the ffuf security tool.
description: 'CyberStrikeAI wrapper for `ffuf`. Command: `ffuf`. Review scope and arguments before execution.'
parameters:
- name: url
  type: string
  description: Value for `url`. Maps to `-u`.
  required: true
  flag: -u
  format: flag
- name: wordlist
  type: string
  description: Value for `wordlist`. Maps to `-w`.
  required: false
  default: /usr/share/wordlists/dirb/common.txt
  flag: -w
  format: flag
- name: match_codes
  type: string
  description: Value for `match_codes`. Maps to `-mc`.
  required: false
  default: 200,204,301,302,307,401,403
  flag: -mc
  format: flag
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  format: positional
