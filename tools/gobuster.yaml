name: gobuster
command: gobuster
enabled: true
short_description: Run the gobuster security tool.
description: 'CyberStrikeAI wrapper for `gobuster`. Command: `gobuster`. Review scope and arguments before execution.'
parameters:
- name: mode
  type: string
  description: Value for `mode`.
  required: false
  default: dir
  position: 0
  format: positional
  options:
  - dir
  - dns
  - fuzz
  - vhost
- name: url
  type: string
  description: Value for `url`. Maps to `-u`.
  required: true
  flag: -u
  format: flag
- name: wordlist
  type: string
  description: Value for `wordlist`. Maps to `-w`.
  required: false
  default: /usr/share/wordlists/dirb/common.txt
  flag: -w
  format: flag
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  format: positional
