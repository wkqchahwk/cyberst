name: install-python-package
command: /bin/bash
args:
- -c
- "set -euo pipefail\n\nPACKAGE=\"$1\"\nENV_NAME=\"${2:-default}\"\nADDITIONAL_ARGS=\"${3:-}\"\n\nBASE_DIR=\"${HOME}/.cyberstrike/venvs\"\n\ndetect_project_root() {\n  if [ -n \"${CYBERSTRIKE_ROOT:-}\" ] && [ -d \"${CYBERSTRIKE_ROOT}\" ]; then\n    printf '%s\\n' \"${CYBERSTRIKE_ROOT}\"\n    return\n  fi\n  if command -v git >/dev/null 2>&1; then\n    local root_path\n    if root_path=$(git rev-parse --show-toplevel 2>/dev/null); then\n      printf '%s\\n' \"$root_path\"\n      return\n    fi\n  fi\n  printf '%s\\n' \"$(pwd)\"\n}\n\nresolve_env_dir() {\n  local requested=\"$1\"\n  if [ -n \"${VIRTUAL_ENV:-}\" ] && { [ -z \"$requested\" ] || [ \"$requested\" = \"default\" ]; }; then\n    printf '%s\\n' \"$VIRTUAL_ENV\"\n    return\n  fi\n  if [ -z \"$requested\" ] || [ \"$requested\" = \"default\" ]; then\n    local root\n    root=\"$(detect_project_root)\"\n    printf '%s/venv\\n' \"$root\"\n    return\n  fi\n  printf '%s/%s\\n' \"$BASE_DIR\" \"$requested\"\n}\n\nENV_DIR=\"$(resolve_env_dir\
  \ \"$ENV_NAME\")\"\nmkdir -p \"$(dirname \"$ENV_DIR\")\"\nif [ ! -d \"$ENV_DIR\" ]; then\n  python3 -m venv \"$ENV_DIR\"\nfi\n\n# shellcheck disable=SC1090\nsource \"$ENV_DIR/bin/activate\"\n\nif [ -n \"$ADDITIONAL_ARGS\" ]; then\n  pip install \"$PACKAGE\" $ADDITIONAL_ARGS\nelse\n  pip install \"$PACKAGE\"\nfi\n"
- _
enabled: true
short_description: Run the install-python-package security tool.
description: 'CyberStrikeAI wrapper for `install-python-package`. Command: `/bin/bash`. Review scope and arguments before execution.'
parameters:
- name: package
  type: string
  description: Value for `package`.
  required: true
  position: 0
  format: positional
- name: env_name
  type: string
  description: Value for `env_name`.
  required: false
  default: default
  position: 1
  format: positional
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  format: positional
  default: ''
