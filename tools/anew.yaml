name: anew
command: python3
args:
- -c
- "import shlex\nimport subprocess\nimport sys\n\nif len(sys.argv) < 2:\n    sys.stderr.write(\"\u7F3A\u5C11\u8F93\u5165\u6570\u636E\\n\")\n    sys.exit(1)\n\ninput_data = sys.argv[1]\noutput_file = sys.argv[2] if len(sys.argv) > 2 else \"\"\nadditional = sys.argv[3] if len(sys.argv) > 3 else \"\"\n\ncmd = [\"anew\"]\nif additional:\n    cmd.extend(shlex.split(additional))\nif output_file:\n    cmd.append(output_file)\n\nproc = subprocess.run(\n    cmd,\n    input=input_data.encode(\"utf-8\"),\n    capture_output=True,\n    text=True,\n)\n\nif proc.returncode != 0:\n    sys.stderr.write(proc.stderr or proc.stdout)\n    sys.exit(proc.returncode)\n\nsys.stdout.write(proc.stdout)\n"
enabled: true
short_description: Run the anew security tool.
description: 'CyberStrikeAI wrapper for `anew`. Command: `python3`. Review scope and arguments before execution.'
parameters:
- name: input_data
  type: string
  description: Value for `input_data`.
  required: true
  position: 0
  format: positional
- name: output_file
  type: string
  description: Value for `output_file`.
  required: false
  default: ''
  position: 1
  format: positional
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  default: ''
  position: 2
  format: positional
