name: foremost
command: foremost
enabled: true
short_description: Run the foremost security tool.
description: 'CyberStrikeAI wrapper for `foremost`. Command: `foremost`. Review scope and arguments before execution.'
parameters:
- name: input_file
  type: string
  description: Value for `input_file`. Maps to `-i`.
  required: true
  flag: -i
  format: flag
- name: output_dir
  type: string
  description: Value for `output_dir`. Maps to `-o`.
  required: false
  flag: -o
  format: flag
  default: /tmp/foremost_output
- name: file_types
  type: string
  description: Value for `file_types`. Maps to `-t`.
  required: false
  flag: -t
  format: flag
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  format: positional
