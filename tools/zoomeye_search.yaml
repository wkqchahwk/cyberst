- name: query
  type: string
  description: Value for `query`.
  required: true
  position: 1
  format: positional
- name: page
  type: int
  description: Value for `page`.
  required: false
  position: 2
  format: positional
  default: 1
- name: pagesize
  type: int
  description: Value for `pagesize`.
  required: false
  position: 3
  format: positional
  default: 5
- name: fields
  type: string
  description: Value for `fields`.
  required: false
  position: 4
  format: positional
  default: ip,port,domain,update_time
- name: sub_type
  type: string
  description: Value for `sub_type`.
  required: false
  position: 5
  format: positional
  default: v4
- name: facets
  type: string
  description: Value for `facets`.
  required: false
  position: 6
  format: positional
- name: ignore_cache
  type: bool
  description: Value for `ignore_cache`.
  required: false
  position: 7
  format: positional
  default: false
