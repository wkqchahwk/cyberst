name: hash-identifier
command: python3
args:
- -c
- "import shlex\nimport subprocess\nimport sys\n\nif len(sys.argv) < 2:\n    sys.stderr.write(\"\u7F3A\u5C11\u54C8\u5E0C\u503C\\n\")\n    sys.exit(1)\n\nhash_value = sys.argv[1]\nextra = sys.argv[2] if len(sys.argv) > 2 else \"\"\n\ncmd = [\"hash-identifier\"]\nif extra:\n    cmd.extend(shlex.split(extra))\n\nproc = subprocess.run(\n    cmd,\n    input=f\"{hash_value}\\n\",\n    capture_output=True,\n    text=True,\n)\n\nif proc.returncode != 0:\n    sys.stderr.write(proc.stderr or proc.stdout)\n    sys.exit(proc.returncode)\n\nsys.stdout.write(proc.stdout)\n"
enabled: true
short_description: Run the hash-identifier security tool.
description: 'CyberStrikeAI wrapper for `hash-identifier`. Command: `python3`. Review scope and arguments before execution.'
parameters:
- name: hash
  type: string
  description: Value for `hash`.
  required: true
  position: 0
  format: positional
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  default: ''
  position: 1
  format: positional
