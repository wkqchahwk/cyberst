name: pwntools
command: python3
args:
- -c
- "import os\nimport sys\n\nif len(sys.argv) < 2:\n    sys.stderr.write(\"\u7F3A\u5C11\u811A\u672C\u5185\u5BB9\\n\")\n    sys.exit(1)\n\nscript_content = sys.argv[1]\ntarget_binary = sys.argv[2] if len(sys.argv) > 2 else \"\"\ntarget_host = sys.argv[3] if len(sys.argv) > 3 else \"\"\ntarget_port = sys.argv[4] if len(sys.argv) > 4 else \"\"\nexploit_type = sys.argv[5] if len(sys.argv) > 5 else \"local\"\n\nif target_binary:\n    os.environ[\"PWN_BINARY\"] = target_binary\nif target_host:\n    os.environ[\"PWN_HOST\"] = target_host\nif target_port:\n    os.environ[\"PWN_PORT\"] = str(target_port)\nif exploit_type:\n    os.environ[\"PWN_EXPLOIT_TYPE\"] = exploit_type\n\nexec(script_content, {})\n"
enabled: true
short_description: Run the pwntools security tool.
description: 'CyberStrikeAI wrapper for `pwntools`. Command: `python3`. Review scope and arguments before execution.'
parameters:
- name: script_content
  type: string
  description: Value for `script_content`.
  required: true
  position: 0
  format: positional
- name: target_binary
  type: string
  description: Value for `target_binary`.
  required: false
  default: ''
  position: 1
  format: positional
- name: target_host
  type: string
  description: Value for `target_host`.
  required: false
  default: ''
  position: 2
  format: positional
- name: target_port
  type: string
  description: Value for `target_port`.
  required: false
  default: ''
  position: 3
  format: positional
- name: exploit_type
  type: string
  description: Value for `exploit_type`.
  required: false
  default: local
  position: 4
  format: positional
