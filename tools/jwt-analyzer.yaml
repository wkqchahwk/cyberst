name: jwt-analyzer
command: jwt_tool
enabled: true
short_description: Run the jwt-analyzer security tool.
description: 'CyberStrikeAI wrapper for `jwt-analyzer`. Command: `jwt_tool`. Review scope and arguments before execution.'
parameters:
- name: jwt_token
  type: string
  description: Value for `jwt_token`. Maps to `-t`.
  required: true
  flag: -t
  format: flag
- name: target_url
  type: string
  description: Value for `target_url`. Maps to `-u`.
  required: false
  flag: -u
  format: flag
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  format: positional
