name: zap
command: zap-cli
enabled: false
short_description: Run the zap security tool.
description: 'CyberStrikeAI wrapper for `zap`. Command: `zap-cli`. Review scope and arguments before execution.'
parameters:
- name: target
  type: string
  description: Value for `target`. Maps to `-t`.
  required: true
  flag: -t
  format: flag
- name: scan_type
  type: string
  description: Value for `scan_type`. Maps to `--scan-type`.
  required: false
  flag: --scan-type
  format: flag
  default: baseline
- name: api_key
  type: string
  description: Value for `api_key`. Maps to `--api-key`.
  required: false
  flag: --api-key
  format: flag
- name: daemon
  type: bool
  description: Value for `daemon`. Maps to `--daemon`.
  required: false
  flag: --daemon
  format: flag
  default: false
- name: port
  type: string
  description: Value for `port`. Maps to `--port`.
  required: false
  flag: --port
  format: flag
  default: '8090'
- name: format_type
  type: string
  description: Value for `format_type`. Maps to `--format`.
  required: false
  flag: --format
  format: flag
  default: xml
- name: output_file
  type: string
  description: Value for `output_file`. Maps to `--output`.
  required: false
  flag: --output
  format: flag
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  format: positional
