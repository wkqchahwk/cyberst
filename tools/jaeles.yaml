name: jaeles
command: jaeles
args:
- scan
enabled: true
short_description: Run the jaeles security tool.
description: 'CyberStrikeAI wrapper for `jaeles`. Command: `jaeles`. Review scope and arguments before execution.'
parameters:
- name: url
  type: string
  description: Value for `url`. Maps to `-u`.
  required: true
  flag: -u
  format: flag
- name: signatures
  type: string
  description: Value for `signatures`. Maps to `-s`.
  required: false
  flag: -s
  format: flag
- name: config
  type: string
  description: Value for `config`. Maps to `-c`.
  required: false
  flag: -c
  format: flag
- name: threads
  type: int
  description: Value for `threads`. Maps to `-t`.
  required: false
  flag: -t
  format: flag
  default: 20
- name: timeout
  type: int
  description: Value for `timeout`. Maps to `--timeout`.
  required: false
  flag: --timeout
  format: flag
  default: 20
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  format: positional
