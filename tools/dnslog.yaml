name: dnslog
command: python3
args:
- -c
- "import sys\nimport requests\nimport json\nimport time\nimport os\nimport tempfile\n\nif len(sys.argv) < 2:\n    sys.stderr.write(\"\u9519\u8BEF: \u7F3A\u5C11\u64CD\u4F5C\u7C7B\u578B\u53C2\u6570 (get_domain \u6216 get_records)\\n\")\n    sys.exit(1)\n\noperation = sys.argv[1]\nbase_url = \"http://dnslog.cn\"\n\n# \u4F7F\u7528\u4E34\u65F6\u6587\u4EF6\u5B58\u50A8Cookie\ncookie_file = os.path.join(tempfile.gettempdir(), \"dnslog_cookie.txt\")\n\n# \u521B\u5EFAsession\u4EE5\u4FDD\u6301Cookie\nsession = requests.Session()\n\n# \u5982\u679CCookie\u6587\u4EF6\u5B58\u5728\uFF0C\u52A0\u8F7DCookie\ntry:\n    if os.path.exists(cookie_file):\n        with open(cookie_file, 'r') as f:\n            for line in f:\n                if 'PHPSESSID' in line:\n                    session.cookies.set('PHPSESSID', line.strip().split('=')[1])\nexcept:\n    pass\n\ntry:\n    if operation == \"get_domain\":\n        # \u83B7\u53D6\u4E34\u65F6\u57DF\u540D\uFF08\u8FD9\u4F1A\u8BBE\u7F6ECookie\uFF09\n        response\
  \ = session.get(f\"{base_url}/getdomain.php\", timeout=10)\n        response.raise_for_status()\n        domain = response.text.strip().rstrip('%')\n        \n        # \u4FDD\u5B58Cookie\u5230\u6587\u4EF6\n        try:\n            with open(cookie_file, 'w') as f:\n                for cookie in session.cookies:\n                    f.write(f\"{cookie.name}={cookie.value}\\n\")\n        except:\n            pass\n        \n        if domain:\n            result = {\n                \"status\": \"success\",\n                \"domain\": domain,\n                \"message\": f\"\u6210\u529F\u83B7\u53D6\u4E34\u65F6\u57DF\u540D: {domain}\",\n                \"usage\": f\"\u4F7F\u7528\u6B64\u57DF\u540D\u8FDB\u884CDNS\u67E5\u8BE2\u6D4B\u8BD5\uFF0C\u4F8B\u5982: nslookup {domain} \u6216 ping http://{domain}\",\n                \"note\": \"\u57DF\u540D\u6709\u6548\u671F\u4E3A24\u5C0F\u65F6\uFF0C\u8BF7\u53CA\u65F6\u67E5\u8BE2\u8BB0\u5F55\"\n            }\n            print(json.dumps(result, ensure_ascii=False,\
  \ indent=2))\n        else:\n            print(json.dumps({\n                \"status\": \"error\",\n                \"message\": \"\u672A\u80FD\u83B7\u53D6\u5230\u57DF\u540D\uFF0C\u8BF7\u7A0D\u540E\u91CD\u8BD5\"\n            }, ensure_ascii=False, indent=2))\n            sys.exit(1)\n    \n    elif operation == \"get_records\":\n        # \u83B7\u53D6DNS\u67E5\u8BE2\u8BB0\u5F55\n        if len(sys.argv) < 3:\n            sys.stderr.write(\"\u9519\u8BEF: get_records \u64CD\u4F5C\u9700\u8981\u63D0\u4F9B\u57DF\u540D\u53C2\u6570\\n\")\n            sys.exit(1)\n        \n        domain = sys.argv[2]\n        wait_time = int(sys.argv[3]) if len(sys.argv) > 3 and sys.argv[3] else 0\n        \n        # \u5982\u679C\u6307\u5B9A\u4E86\u7B49\u5F85\u65F6\u95F4\uFF0C\u5148\u7B49\u5F85\n        if wait_time > 0:\n            print(f\"\u7B49\u5F85 {wait_time} \u79D2\u540E\u67E5\u8BE2\u8BB0\u5F55...\", file=sys.stderr)\n            time.sleep(wait_time)\n        \n        # \u52A0\u8F7DCookie\uFF08\u5982\
  \u679C\u5B58\u5728\uFF09\n        try:\n            if os.path.exists(cookie_file):\n                with open(cookie_file, 'r') as f:\n                    for line in f:\n                        if 'PHPSESSID' in line:\n                            session.cookies.set('PHPSESSID', line.strip().split('=')[1])\n        except:\n            pass\n        \n        response = session.get(f\"{base_url}/getrecords.php\", params={\"t\": domain}, timeout=10)\n        response.raise_for_status()\n        records_text = response.text.strip().rstrip('%')\n        \n        if records_text and records_text != \"[]\" and records_text.strip():\n            # \u5C1D\u8BD5\u89E3\u6790\u4E3AJSON\uFF08\u5982\u679C\u8FD4\u56DE\u7684\u662FJSON\u683C\u5F0F\uFF09\n            try:\n                records = json.loads(records_text)\n                if isinstance(records, list) and len(records) > 0:\n                    result = {\n                        \"status\": \"success\",\n                        \"\
  domain\": domain,\n                        \"record_count\": len(records),\n                        \"records\": records,\n                        \"message\": f\"\u53D1\u73B0 {len(records)} \u6761DNS\u67E5\u8BE2\u8BB0\u5F55\"\n                    }\n                    print(json.dumps(result, ensure_ascii=False, indent=2))\n                else:\n                    result = {\n                        \"status\": \"no_records\",\n                        \"domain\": domain,\n                        \"records\": [],\n                        \"message\": \"\u6682\u65E0DNS\u67E5\u8BE2\u8BB0\u5F55\uFF0C\u76EE\u6807\u53EF\u80FD\u5C1A\u672A\u89E6\u53D1DNS\u67E5\u8BE2\"\n                    }\n                    print(json.dumps(result, ensure_ascii=False, indent=2))\n            except json.JSONDecodeError:\n                # \u5982\u679C\u4E0D\u662FJSON\uFF0C\u6309\u884C\u5206\u5272\n                records = [line.strip() for line in records_text.split(\"\\n\") if line.strip() and line.strip()\
  \ != \"[]\"]\n                if records:\n                    result = {\n                        \"status\": \"success\",\n                        \"domain\": domain,\n                        \"record_count\": len(records),\n                        \"records\": records,\n                        \"message\": f\"\u53D1\u73B0 {len(records)} \u6761DNS\u67E5\u8BE2\u8BB0\u5F55\"\n                    }\n                    print(json.dumps(result, ensure_ascii=False, indent=2))\n                else:\n                    result = {\n                        \"status\": \"no_records\",\n                        \"domain\": domain,\n                        \"records\": [],\n                        \"message\": \"\u6682\u65E0DNS\u67E5\u8BE2\u8BB0\u5F55\"\n                    }\n                    print(json.dumps(result, ensure_ascii=False, indent=2))\n        else:\n            result = {\n                \"status\": \"no_records\",\n                \"domain\": domain,\n                \"records\"\
  : [],\n                \"message\": \"\u6682\u65E0DNS\u67E5\u8BE2\u8BB0\u5F55\uFF0C\u76EE\u6807\u53EF\u80FD\u5C1A\u672A\u89E6\u53D1DNS\u67E5\u8BE2\"\n            }\n            print(json.dumps(result, ensure_ascii=False, indent=2))\n    \n    else:\n        sys.stderr.write(f\"\u9519\u8BEF: \u672A\u77E5\u7684\u64CD\u4F5C\u7C7B\u578B '{operation}'\uFF0C\u652F\u6301\u7684\u64CD\u4F5C: get_domain, get_records\\n\")\n        sys.exit(1)\n\nexcept requests.RequestException as e:\n    error_result = {\n        \"status\": \"error\",\n        \"message\": f\"\u8BF7\u6C42\u5931\u8D25: {str(e)}\",\n        \"suggestion\": \"\u8BF7\u68C0\u67E5\u7F51\u7EDC\u8FDE\u63A5\u6216\u7A0D\u540E\u91CD\u8BD5\"\n    }\n    print(json.dumps(error_result, ensure_ascii=False, indent=2))\n    sys.exit(1)\nexcept Exception as e:\n    error_result = {\n        \"status\": \"error\",\n        \"message\": f\"\u6267\u884C\u51FA\u9519: {str(e)}\"\n    }\n    print(json.dumps(error_result, ensure_ascii=False, indent=2))\n\
  \    sys.exit(1)\n"
enabled: true
short_description: Run the dnslog security tool.
description: 'CyberStrikeAI wrapper for `dnslog`. Command: `python3`. Review scope and arguments before execution.'
parameters:
- name: operation
  type: string
  description: Value for `operation`.
  required: true
  position: 0
  format: positional
- name: domain
  type: string
  description: Value for `domain`.
  required: false
  position: 1
  format: positional
- name: wait_time
  type: int
  description: Value for `wait_time`.
  required: false
  position: 2
  format: positional
  default: 0
