name: falco
command: falco
enabled: true
short_description: Run the falco security tool.
description: 'CyberStrikeAI wrapper for `falco`. Command: `falco`. Review scope and arguments before execution.'
parameters:
- name: config_file
  type: string
  description: Value for `config_file`. Maps to `--config`.
  required: false
  flag: --config
  format: flag
  default: /etc/falco/falco.yaml
- name: rules_file
  type: string
  description: Value for `rules_file`. Maps to `--rules`.
  required: false
  flag: --rules
  format: flag
- name: json_output
  type: bool
  description: Value for `json_output`. Maps to `-o json_output=true`.
  required: false
  flag: -o json_output=true
  format: flag
  default: true
- name: duration
  type: int
  description: Value for `duration`. Maps to `--duration`.
  required: false
  flag: --duration
  format: flag
  default: 60
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  format: positional
