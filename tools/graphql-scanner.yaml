name: graphql-scanner
command: graphqlmap
enabled: true
short_description: Run the graphql-scanner security tool.
description: 'CyberStrikeAI wrapper for `graphql-scanner`. Command: `graphqlmap`. Review scope and arguments before execution.'
parameters:
- name: endpoint
  type: string
  description: Value for `endpoint`. Maps to `-u`.
  required: true
  flag: -u
  format: flag
- name: introspection
  type: bool
  description: Value for `introspection`. Maps to `--introspection`.
  required: false
  default: true
  flag: --introspection
  format: flag
- name: query_depth
  type: int
  description: Value for `query_depth`. Maps to `--depth`.
  required: false
  default: 10
  flag: --depth
  format: flag
- name: test_mutations
  type: bool
  description: Value for `test_mutations`. Maps to `--mutations`.
  required: false
  default: true
  flag: --mutations
  format: flag
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  format: positional
