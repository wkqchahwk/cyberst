name: hashcat
command: hashcat
enabled: true
short_description: Run the hashcat security tool.
description: 'CyberStrikeAI wrapper for `hashcat`. Command: `hashcat`. Review scope and arguments before execution.'
parameters:
- name: hash_file
  type: string
  description: Value for `hash_file`.
  required: true
  position: 0
  format: positional
- name: hash_type
  type: string
  description: Value for `hash_type`. Maps to `-m`.
  required: true
  flag: -m
  format: flag
- name: attack_mode
  type: string
  description: Value for `attack_mode`. Maps to `-a`.
  required: false
  default: '0'
  flag: -a
  format: flag
- name: wordlist
  type: string
  description: Value for `wordlist`.
  required: false
  default: /usr/share/wordlists/rockyou.txt
  position: 1
  format: positional
- name: mask
  type: string
  description: Value for `mask`.
  required: false
  position: 2
  format: positional
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  format: positional
