- name: query
  type: string
  description: Value for `query`.
  required: true
  position: 1
  format: positional
- name: page
  type: int
  description: Value for `page`.
  required: false
  position: 2
  format: positional
  default: 1
- name: facets
  type: string
  description: Value for `facets`.
  required: false
  position: 3
  format: positional
- name: minify
  type: bool
  description: Value for `minify`.
  required: false
  position: 4
  format: positional
  default: true
- name: fields
  type: string
  description: Value for `fields`.
  required: false
  position: 5
  format: positional
- name: count_only
  type: bool
  description: Value for `count_only`.
  required: false
  position: 6
  format: positional
  default: false
- name: size
  type: int
  description: Value for `size`.
  required: false
  position: 7
  format: positional
