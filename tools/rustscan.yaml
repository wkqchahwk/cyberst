name: rustscan
command: rustscan
enabled: true
short_description: Run the rustscan security tool.
description: 'CyberStrikeAI wrapper for `rustscan`. Command: `rustscan`. Review scope and arguments before execution.'
parameters:
- name: target
  type: string
  description: Value for `target`. Maps to `-a`.
  required: true
  flag: -a
  format: flag
- name: ports
  type: string
  description: Value for `ports`. Maps to `-p`.
  required: false
  flag: -p
  format: flag
- name: range
  type: string
  description: Value for `range`. Maps to `-r`.
  required: false
  flag: -r
  format: flag
- name: ulimit
  type: int
  description: Value for `ulimit`. Maps to `-u`.
  required: false
  flag: -u
  format: flag
  default: 5000
- name: scripts
  type: string
  description: Value for `scripts`. Maps to `--scripts`.
  required: false
  flag: --scripts
  format: flag
  default: none
  options:
  - none
  - default
  - custom
- name: greppable
  type: bool
  description: Value for `greppable`. Maps to `-g`.
  required: false
  flag: -g
  format: flag
  default: false
- name: batch_size
  type: int
  description: Value for `batch_size`. Maps to `-b`.
  required: false
  flag: -b
  format: flag
- name: timeout_ms
  type: int
  description: Value for `timeout_ms`. Maps to `-t`.
  required: false
  flag: -t
  format: flag
- name: scan_order
  type: string
  description: Value for `scan_order`. Maps to `--scan-order`.
  required: false
  flag: --scan-order
  format: flag
  options:
  - serial
  - random
- name: top_ports
  type: bool
  description: Value for `top_ports`. Maps to `--top`.
  required: false
  flag: --top
  format: flag
  default: false
- name: exclude_ports
  type: string
  description: Value for `exclude_ports`. Maps to `-e`.
  required: false
  flag: -e
  format: flag
- name: exclude_addresses
  type: string
  description: Value for `exclude_addresses`. Maps to `-x`.
  required: false
  flag: -x
  format: flag
- name: tries
  type: int
  description: Value for `tries`. Maps to `--tries`.
  required: false
  flag: --tries
  format: flag
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  format: positional
