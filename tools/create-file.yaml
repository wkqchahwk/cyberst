name: create-file
command: python3
args:
- -c
- "import base64\nimport sys\nfrom pathlib import Path\n\nif len(sys.argv) < 3:\n    sys.stderr.write(\"Usage: create-file <filename> <content> [binary]\\n\")\n    sys.exit(1)\n\nfilename = sys.argv[1]\ncontent = sys.argv[2]\nbinary_arg = sys.argv[3].lower() if len(sys.argv) > 3 else \"false\"\nbinary = binary_arg in (\"1\", \"true\", \"yes\", \"on\")\n\npath = Path(filename)\nif not path.is_absolute():\n    path = Path.cwd() / path\npath.parent.mkdir(parents=True, exist_ok=True)\n\nif binary:\n    data = base64.b64decode(content)\n    path.write_bytes(data)\nelse:\n    path.write_text(content, encoding=\"utf-8\")\n\nprint(f\"\u6587\u4EF6\u5DF2\u521B\u5EFA: {path}\")\n"
enabled: true
short_description: Run the create-file security tool.
description: 'CyberStrikeAI wrapper for `create-file`. Command: `python3`. Review scope and arguments before execution.'
parameters:
- name: filename
  type: string
  description: Value for `filename`.
  required: true
  position: 0
  format: positional
- name: content
  type: string
  description: Value for `content`.
  required: true
  position: 1
  format: positional
- name: binary
  type: bool
  description: Value for `binary`.
  required: false
  position: 2
  format: positional
  default: false
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  format: positional
