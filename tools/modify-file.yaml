name: modify-file
command: python3
args:
- -c
- "import sys\nfrom pathlib import Path\n\nif len(sys.argv) < 3:\n    sys.stderr.write(\"Usage: modify-file <filename> <content> [append]\\n\")\n    sys.exit(1)\n\nfilename = sys.argv[1]\ncontent = sys.argv[2]\nappend_arg = sys.argv[3].lower() if len(sys.argv) > 3 else \"false\"\nappend = append_arg in (\"1\", \"true\", \"yes\", \"on\")\n\npath = Path(filename)\nif not path.is_absolute():\n    path = Path.cwd() / path\npath.parent.mkdir(parents=True, exist_ok=True)\n\nmode = \"a\" if append else \"w\"\nwith path.open(mode, encoding=\"utf-8\") as f:\n    f.write(content)\n\naction = \"\u8FFD\u52A0\" if append else \"\u8986\u76D6\"\nprint(f\"{action}\u5199\u5165\u5B8C\u6210: {path}\")\n"
enabled: true
short_description: Run the modify-file security tool.
description: 'CyberStrikeAI wrapper for `modify-file`. Command: `python3`. Review scope and arguments before execution.'
parameters:
- name: filename
  type: string
  description: Value for `filename`.
  required: true
  position: 0
  format: positional
- name: content
  type: string
  description: Value for `content`.
  required: true
  position: 1
  format: positional
- name: append
  type: bool
  description: Value for `append`.
  required: false
  default: false
  position: 2
  format: positional
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  format: positional
