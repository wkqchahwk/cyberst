name: qsreplace
command: python3
args:
- -c
- "import shlex\nimport subprocess\nimport sys\n\nif len(sys.argv) < 2:\n    sys.stderr.write(\"\u7F3A\u5C11URL\u5217\u8868\\n\")\n    sys.exit(1)\n\nurls = sys.argv[1]\nreplacement = sys.argv[2] if len(sys.argv) > 2 else \"\"\nextra = sys.argv[3] if len(sys.argv) > 3 else \"\"\n\ncmd = [\"qsreplace\"]\nif extra:\n    cmd.extend(shlex.split(extra))\nif replacement:\n    cmd.append(replacement)\n\nproc = subprocess.run(\n    cmd,\n    input=urls,\n    capture_output=True,\n    text=True,\n)\nif proc.stdout:\n    sys.stdout.write(proc.stdout)\nif proc.stderr:\n    sys.stderr.write(proc.stderr)\nsys.exit(proc.returncode)\n"
enabled: true
short_description: Run the qsreplace security tool.
description: 'CyberStrikeAI wrapper for `qsreplace`. Command: `python3`. Review scope and arguments before execution.'
parameters:
- name: urls
  type: string
  description: Value for `urls`.
  required: true
  position: 0
  format: positional
- name: replacement
  type: string
  description: Value for `replacement`.
  required: false
  default: ''
  position: 1
  format: positional
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  default: ''
  position: 2
  format: positional
