name: arjun
command: arjun
enabled: true
short_description: Run the arjun security tool.
description: 'CyberStrikeAI wrapper for `arjun`. Command: `arjun`. Review scope and arguments before execution.'
parameters:
- name: url
  type: string
  description: Value for `url`. Maps to `-u`.
  required: true
  flag: -u
  format: flag
- name: method
  type: string
  description: Value for `method`. Maps to `-m`.
  required: false
  flag: -m
  format: flag
  default: GET
- name: wordlist
  type: string
  description: Value for `wordlist`. Maps to `-w`.
  required: false
  flag: -w
  format: flag
- name: threads
  type: int
  description: Value for `threads`. Maps to `-t`.
  required: false
  flag: -t
  format: flag
  default: 25
- name: stable
  type: bool
  description: Value for `stable`. Maps to `--stable`.
  required: false
  flag: --stable
  format: flag
  default: false
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  format: positional
