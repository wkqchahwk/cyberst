name: nmap
command: nmap
args:
- -sT
- -sV
- -sC
enabled: true
short_description: Run the nmap security tool.
description: 'CyberStrikeAI wrapper for `nmap`. Command: `nmap`. Review scope and arguments before execution.'
parameters:
- name: target
  type: string
  description: Value for `target`.
  required: true
  position: 1
  format: positional
- name: ports
  type: string
  description: Value for `ports`. Maps to `-p`.
  required: false
  flag: -p
  format: flag
- name: timing
  type: string
  description: Value for `timing`.
  required: false
  format: template
  template: -T{value}
- name: nse_scripts
  type: string
  description: Value for `nse_scripts`. Maps to `--script`.
  required: false
  flag: --script
  format: flag
- name: os_detection
  type: bool
  description: Value for `os_detection`. Maps to `-O`.
  required: false
  flag: -O
  format: flag
  default: false
- name: aggressive
  type: bool
  description: Value for `aggressive`. Maps to `-A`.
  required: false
  flag: -A
  format: flag
  default: false
- name: scan_type
  type: string
  description: Value for `scan_type`.
  required: false
  format: template
  template: '{value}'
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  format: positional
