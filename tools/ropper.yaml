name: ropper
command: ropper
enabled: true
short_description: Run the ropper security tool.
description: 'CyberStrikeAI wrapper for `ropper`. Command: `ropper`. Review scope and arguments before execution.'
parameters:
- name: binary
  type: string
  description: Value for `binary`. Maps to `--file`.
  required: true
  flag: --file
  format: flag
- name: gadget_type
  type: string
  description: Value for `gadget_type`. Maps to `--type`.
  required: false
  flag: --type
  format: flag
  default: rop
- name: quality
  type: int
  description: Value for `quality`. Maps to `--quality`.
  required: false
  flag: --quality
  format: flag
  default: 1
- name: arch
  type: string
  description: Value for `arch`. Maps to `--arch`.
  required: false
  flag: --arch
  format: flag
- name: search_string
  type: string
  description: Value for `search_string`. Maps to `--search`.
  required: false
  flag: --search
  format: flag
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  format: positional
