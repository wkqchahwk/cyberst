name: katana
command: katana
enabled: true
short_description: Run the katana security tool.
description: 'CyberStrikeAI wrapper for `katana`. Command: `katana`. Review scope and arguments before execution.'
parameters:
- name: url
  type: string
  description: Value for `url`. Maps to `-u`.
  required: true
  flag: -u
  format: flag
- name: depth
  type: int
  description: Value for `depth`. Maps to `-d`.
  required: false
  flag: -d
  format: flag
  default: 3
- name: js_crawl
  type: bool
  description: Value for `js_crawl`. Maps to `-jc`.
  required: false
  flag: -jc
  format: flag
  default: true
- name: form_extraction
  type: bool
  description: Value for `form_extraction`. Maps to `-forms`.
  required: false
  flag: -forms
  format: flag
  default: true
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  format: positional
