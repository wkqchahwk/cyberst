name: trivy
command: trivy
enabled: true
short_description: Run the trivy security tool.
description: 'CyberStrikeAI wrapper for `trivy`. Command: `trivy`. Review scope and arguments before execution.'
parameters:
- name: scan_type
  type: string
  description: Value for `scan_type`.
  required: false
  default: image
  position: 0
  format: positional
- name: target
  type: string
  description: Value for `target`.
  required: true
  position: 1
  format: positional
- name: severity
  type: string
  description: Value for `severity`. Maps to `--severity`.
  required: false
  flag: --severity
  format: flag
- name: output_format
  type: string
  description: Value for `output_format`. Maps to `--format`.
  required: false
  flag: --format
  format: flag
  default: json
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  format: positional
