name: clair
command: clair
enabled: false
short_description: Run the clair security tool.
description: 'CyberStrikeAI wrapper for `clair`. Command: `clair`. Review scope and arguments before execution.'
parameters:
- name: image
  type: string
  description: Value for `image`. Maps to `--image`.
  required: true
  flag: --image
  format: flag
- name: config
  type: string
  description: Value for `config`. Maps to `--config`.
  required: false
  flag: --config
  format: flag
  default: /etc/clair/config.yaml
- name: output_format
  type: string
  description: Value for `output_format`. Maps to `--format`.
  required: false
  flag: --format
  format: flag
  default: json
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  format: positional
