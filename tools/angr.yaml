name: angr
command: python3
args:
- -c
- "import shlex\nimport sys\n\nif len(sys.argv) < 2:\n    sys.stderr.write(\"\u7F3A\u5C11\u811A\u672C\u5185\u5BB9\\n\")\n    sys.exit(1)\n\nscript_content = sys.argv[1]\nbinary = sys.argv[2] if len(sys.argv) > 2 else \"\"\nfind_address = sys.argv[3] if len(sys.argv) > 3 else \"\"\navoid_addresses = sys.argv[4] if len(sys.argv) > 4 else \"\"\nanalysis_type = sys.argv[5] if len(sys.argv) > 5 else \"\"\nextra = sys.argv[6] if len(sys.argv) > 6 else \"\"\n\ncontext = {\n    \"binary_path\": binary,\n    \"find_address\": find_address,\n    \"avoid_addresses\": [addr.strip() for addr in avoid_addresses.split(\",\") if addr.strip()],\n    \"analysis_type\": analysis_type or \"symbolic\",\n}\n\nif extra:\n    context[\"additional_args\"] = shlex.split(extra)\nelse:\n    context[\"additional_args\"] = []\n\n# \u6267\u884C\u7528\u6237\u811A\u672C\uFF0C\u63D0\u4F9B\u4E0A\u4E0B\u6587\u53D8\u91CF\nexec(script_content, context)\n"
enabled: true
short_description: Run the angr security tool.
description: 'CyberStrikeAI wrapper for `angr`. Command: `python3`. Review scope and arguments before execution.'
parameters:
- name: script_content
  type: string
  description: Value for `script_content`.
  required: true
  position: 0
  format: positional
- name: binary
  type: string
  description: Value for `binary`.
  required: false
  default: ''
  position: 1
  format: positional
- name: find_address
  type: string
  description: Value for `find_address`.
  required: false
  default: ''
  position: 2
  format: positional
- name: avoid_addresses
  type: string
  description: Value for `avoid_addresses`.
  required: false
  default: ''
  position: 3
  format: positional
- name: analysis_type
  type: string
  description: Value for `analysis_type`.
  required: false
  default: symbolic
  position: 4
  format: positional
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  default: ''
  position: 5
  format: positional
