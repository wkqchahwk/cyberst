name: bloodhound
command: bloodhound-python
enabled: true
requires_action_enabled: true
short_description: Run the bloodhound security tool.
description: 'CyberStrikeAI wrapper for `bloodhound`. Command: `bloodhound-python`. Review scope and arguments before execution.'
parameters:
- name: domain
  type: string
  description: Value for `domain`. Maps to `-d`.
  required: false
  flag: -d
  format: flag
- name: username
  type: string
  description: Value for `username`. Maps to `-u`.
  required: false
  flag: -u
  format: flag
- name: password
  type: string
  description: Value for `password`. Maps to `-p`.
  required: false
  flag: -p
  format: flag
- name: collection_method
  type: string
  description: Value for `collection_method`. Maps to `-c`.
  required: false
  default: All
  flag: -c
  format: flag
- name: dc
  type: string
  description: Value for `dc`. Maps to `-dc`.
  required: false
  flag: -dc
  format: flag
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  format: positional
