name: impacket
command: python3
args:
- -c
- "import json\nimport shlex\nimport subprocess\nimport sys\n\nif len(sys.argv) < 2:\n    sys.stderr.write(\"\u7F3A\u5C11Impacket\u811A\u672C\u8DEF\u5F84\\n\")\n    sys.exit(1)\n\nscript_path = sys.argv[1]\nargs_raw = sys.argv[2] if len(sys.argv) > 2 else \"\"\nextra = sys.argv[3] if len(sys.argv) > 3 else \"\"\n\ncmd = [script_path]\n\nif args_raw:\n    parsed = []\n    try:\n        candidate = json.loads(args_raw)\n        if isinstance(candidate, list):\n            parsed = [str(item) for item in candidate]\n        elif isinstance(candidate, str):\n            parsed = shlex.split(candidate)\n    except (json.JSONDecodeError, ValueError):\n        parsed = shlex.split(args_raw)\n    cmd.extend(parsed)\n\nif extra:\n    cmd.extend(shlex.split(extra))\n\nproc = subprocess.run(cmd, capture_output=True, text=True)\nif proc.stdout:\n    sys.stdout.write(proc.stdout)\nif proc.stderr:\n    sys.stderr.write(proc.stderr)\nsys.exit(proc.returncode)\n"
enabled: true
requires_action_enabled: true
short_description: Run the impacket security tool.
description: 'CyberStrikeAI wrapper for `impacket`. Command: `python3`. Review scope and arguments before execution.'
parameters:
- name: script
  type: string
  description: Value for `script`.
  required: true
  position: 0
  format: positional
- name: args
  type: string
  description: Value for `args`.
  required: false
  default: ''
  position: 1
  format: positional
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  default: ''
  position: 2
  format: positional
