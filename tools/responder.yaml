name: responder
command: python3
args:
- -c
- "import shlex\nimport subprocess\nimport sys\nimport time\n\ninterface = sys.argv[1] if len(sys.argv) > 1 else \"eth0\"\nanalyze = sys.argv[2].lower() == \"true\" if len(sys.argv) > 2 else False\nwpad = sys.argv[3].lower() == \"true\" if len(sys.argv) > 3 else True\nfingerprint = sys.argv[4].lower() == \"true\" if len(sys.argv) > 4 else False\nduration = int(sys.argv[5]) if len(sys.argv) > 5 and sys.argv[5] else 300\nextra = sys.argv[6] if len(sys.argv) > 6 else \"\"\n\ncmd = [\"responder\", \"-I\", interface]\nif analyze:\n    cmd.append(\"-A\")\nif wpad:\n    cmd.append(\"-w\")\nif fingerprint:\n    cmd.append(\"-f\")\nif extra:\n    cmd.extend(shlex.split(extra))\n\nproc = subprocess.Popen(cmd)\ntry:\n    if duration > 0:\n        time.sleep(duration)\n        proc.terminate()\n        proc.wait(timeout=10)\n    else:\n        proc.wait()\nexcept KeyboardInterrupt:\n    proc.terminate()\n    proc.wait(timeout=10)\n"
enabled: true
requires_action_enabled: true
short_description: Run the responder security tool.
description: 'CyberStrikeAI wrapper for `responder`. Command: `python3`. Review scope and arguments before execution.'
parameters:
- name: interface
  type: string
  description: Value for `interface`.
  required: false
  default: eth0
  position: 0
  format: positional
- name: analyze
  type: bool
  description: Value for `analyze`.
  required: false
  default: false
  position: 1
  format: positional
- name: wpad
  type: bool
  description: Value for `wpad`.
  required: false
  default: true
  position: 2
  format: positional
- name: fingerprint
  type: bool
  description: Value for `fingerprint`.
  required: false
  default: false
  position: 3
  format: positional
- name: duration
  type: int
  description: Value for `duration`.
  required: false
  default: 300
  position: 4
  format: positional
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  default: ''
  position: 5
  format: positional
