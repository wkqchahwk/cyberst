name: ghidra
command: analyzeHeadless
enabled: true
short_description: Run the ghidra security tool.
description: 'CyberStrikeAI wrapper for `ghidra`. Command: `analyzeHeadless`. Review scope and arguments before execution.'
parameters:
- name: project_dir
  type: string
  description: Value for `project_dir`.
  required: false
  default: /tmp/ghidra_projects
  position: 0
  format: positional
- name: project_name
  type: string
  description: Value for `project_name`.
  required: false
  default: cyberstrike_analysis
  position: 1
  format: positional
- name: binary
  type: string
  description: Value for `binary`. Maps to `-import`.
  required: true
  flag: -import
  format: flag
- name: script_file
  type: string
  description: Value for `script_file`. Maps to `-postScript`.
  required: false
  flag: -postScript
  format: flag
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  format: positional
