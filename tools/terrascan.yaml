name: terrascan
command: terrascan
enabled: true
short_description: Run the terrascan security tool.
description: 'CyberStrikeAI wrapper for `terrascan`. Command: `terrascan`. Review scope and arguments before execution.'
parameters:
- name: scan_type
  type: string
  description: Value for `scan_type`. Maps to `--scan-type`.
  required: false
  flag: --scan-type
  format: flag
  default: all
- name: iac_dir
  type: string
  description: Value for `iac_dir`. Maps to `-d`.
  required: false
  flag: -d
  format: flag
  default: .
- name: policy_type
  type: string
  description: Value for `policy_type`. Maps to `--policy-type`.
  required: false
  flag: --policy-type
  format: flag
- name: output_format
  type: string
  description: Value for `output_format`. Maps to `--output`.
  required: false
  flag: --output
  format: flag
  default: json
- name: severity
  type: string
  description: Value for `severity`. Maps to `--severity`.
  required: false
  flag: --severity
  format: flag
- name: additional_args
  type: string
  description: Value for `additional_args`.
  required: false
  format: positional
